name: quality-gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  contract-and-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run full tests
        run: go test ./...
      - name: Verify output contract
        run: go test ./cmd/k8doc -run TestPublishedOutputContract -count=1
      - name: Verify runtime guardrails
        run: go test ./internal/diagnostics -run 'Test(PagedListRespectsChunkingAndContinue|PagedListMemoryGuardrail|WithRetryRetriesTransientFailures|ListPodsCachedReusesAPIResult|CollectCapabilityPreflightPartial|RuntimeRoundTripperRetriesAndLimits|TransientErrorClassification|IssuePolicy)' -count=1
      - name: Record benchmark regression artifact
        run: go test ./internal/diagnostics -run '^$' -bench 'Benchmark(PagedListLargeInventory|ListPodsCachedReuse|NormalizeIssuesPolicy)' -benchmem | tee benchmark.txt
      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-benchmarks
          path: benchmark.txt